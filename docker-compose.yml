services:
  db:
    container_name: postgres
    image: postgres:14.1
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: toor
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5332:5432"
    networks:
      - db
    restart: unless-stopped
  amigoscode-api:
    container_name: huseyin-psycho-api
    image: huseyin11/huseyin-psycho-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/customer
    ports:
      - "8088:8080"
    networks:
      - db
    depends_on:
      - db
    restart: unless-stopped
  amigoscode-react:
    container_name: huseyin-psycho-react
    image: huseyin11/husseyin-psycho-react
    build:
      context: frontend/react
      args:
        api_base_url: http://localhost:8088
    ports:
      - "3000:5173"
    depends_on:
      - amigoscode-api
    restart: unless-stopped

networks:
  db:
    driver: bridge

volumes:
  db:
