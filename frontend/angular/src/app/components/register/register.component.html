<div class="flex" style="height: 100vh">
  <div class="col-6 m-3 flex flex-column justify-content-center">
    <div class="m-auto">
      <div class="text-center">
        <p-avatar
          image="./assets/images/user.png"
          styleClass="mr-2"
          size="xlarge"
          shape="circle"
        ></p-avatar>
        <h1>Yeni Kayıt Oluştur</h1>
      </div>
      <p-message
        *ngIf="errorMsg"
        severity="error"
        [text]="errorMsg"
        styleClass="mb-2 w-full"
      ></p-message>
      <div class="field">
        <label for="name">Ad</label>
        <input
          [(ngModel)]="customer.name"
          id="name"
          pInputText
          placeholder="Adınızı giriniz."
          type="text"
          class="w-full"
        >
      </div>
      <div class="field">
        <label for="email">E-posta</label>
        <input
          [(ngModel)]="customer.email"
          id="email"
          pInputText
          placeholder="E-posta adresinizi giriniz."
          type="email"
          class="w-full"
        >
      </div>
      <div class="field">
        <label for="age">Yaş</label>
        <input
          [(ngModel)]="customer.age"
          id="age"
          pInputText
          placeholder="Yaşınızı giriniz."
          type="number"
          class="w-full"
        >
      </div>
      <div class="field">
        <label for="password">Şifre</label>
        <input
          [(ngModel)]="customer.password"
          id="password"
          pInputText
          placeholder="Şifre"
          type="password"
          class="w-full"
        >
      </div>
      <div class="field">
        <label for="gender">Cinsiyet</label>
        <select
          [(ngModel)]="customer.gender"
          class="p-dropdown w-full custom-select"
          id="gender"
        >
          <option value="Cinsiyet Seçiniz" [disabled]="true">Cinsiyet Seçiniz</option>
          <option value="MALE">Erkek</option>
          <option value="FEMALE">Kadın</option>
        </select>
      </div>
      <button
        (click)="createAccount()"
        pButton
        label="Hesabı Oluştur"
        class="w-full"
      ></button>
      <button
        (click)="login()"
        pButton
        label="Hesabın var mı? Giriş Yap O Zaman"
        class="w-full p-button-link text-left pl-0"
      ></button>
    </div>
  </div>
  <div class="col-6 flex flex-column justify-content-center align-items-center right-container">
    <h1>
      <a href="https://www.github.com/huseyinaydin99" target="_blank">Hüseyin AYDIN</a>
    </h1>
    <img
      class="background p-6 pt-0"
      src="https://user-images.githubusercontent.com/40702606/215539167-d7006790-b880-4929-83fb-c43fa74f429e.png"
    >
  </div>
</div>
